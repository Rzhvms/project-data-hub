<div class="object-form">
    <header class="object-form__header">
        <tui-stepper
            [activeItemIndex]="activeStepIndex()"
            (activeItemIndexChange)="activeStepIndex.set($event)"
        >
            @for (step of model().stepList; track step) {
                <button tuiStep>
                    {{ step }}
                </button>
            }
        </tui-stepper>
        <div class="object-form__header-buttons-container">
            <button
                size="m"
                appearance="flat-grayscale"
                [disabled]="activeStepIndex() <= 0"
                tuiIconButton
                iconStart="@tui.chevron-left"
                (click)="activeStepIndex.update((value) => value -= 1)"
            >
                Назад
            </button>
            <button
                size="m"
                appearance="flat-grayscale"
                [disabled]="activeStepIndex() >= model().stepList.length - 1"
                tuiIconButton
                iconEnd="@tui.chevron-right"
                (click)="goToNextStep()"
            >
                Далее
            </button>
        </div>
    </header>
    <main>
        @switch (model().stepList[activeStepIndex()]) {
            @case ('Основные') {
                <ng-container *ngTemplateOutlet="main"></ng-container>
            }
            @case ('Медиа') {
                <h1>Медиа</h1>
            }
            @case('Размеры'){
                <ng-container *ngTemplateOutlet="indicators"></ng-container>
            }
            @case ('Команда') {
                <h1>Команда</h1>
            }
        }
    </main>
</div>

<ng-template #main>
    <form class="object-form__section" [formGroup]="model().mainForm">
        <div class="object-form__group">
            <div class="object-form__row">
                <label class="object-form__control" for="objectTitleControl" tuiLabel>
                    Название*
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().mainForm.controls.title"
                            id="objectTitleControl"
                            tuiInput
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.title" />
                </label>
                <label class="object-form__control" for="objectShortTitleControl" tuiLabel>
                    Краткое название
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().mainForm.controls.shortTitle"
                            id="objectShortTitleControl"
                            tuiInput
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.shortTitle" />
                </label>
            </div>
            <div class="object-form__row">
                <label class="object-form__control" for="objectTypeControl" tuiLabel>
                    Тип*
                    <tui-textfield tuiTextfieldSize="s" tuiChevron>
                        <input
                            [formControl]="model().mainForm.controls.type"
                            id="objectTypeControl"
                            tuiSelect
                        />
                        <tui-data-list-wrapper
                            *tuiDropdown
                            [items]="model().objectTypeList"
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.type" />
                </label>
                <label class="object-form__control" for="objectStageControl" tuiLabel>
                    Стадия*
                    <tui-textfield tuiTextfieldSize="s" tuiChevron>
                        <input
                            [formControl]="model().mainForm.controls.stage"
                            id="objectStageControl"
                            tuiSelect
                        />
                        <tui-data-list-wrapper
                            *tuiDropdown
                            [items]="model().objectStageList"
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.stage" />
                </label>
            </div>
            <div class="object-form__row">
                <label class="object-form__control" for="objectCityControl" tuiLabel>
                    Город*
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().mainForm.controls.city"
                            id="objectCityControl"
                            tuiInput
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.city" />
                </label>
                <label class="object-form__control" for="objectCustomerControl" tuiLabel>
                    Заказчик
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().mainForm.controls.customer"
                            id="objectCustomerControl"
                            tuiInput
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.customer" />
                </label>
            </div>
        </div>
        <div class="object-form__subsection">
            <div class="object-form__group">
                <label class="object-form__control" for="objectFullDescriptionControl" tuiLabel>
                    Описание
                    <tui-textfield tuiTextfieldSize="s">
                        <textarea
                            [formControl]="model().mainForm.controls.fullDescription"
                            id="objectFullDescriptionControl"
                            tuiTextarea
                            [limit]="300"
                            [min]="2"
                            [max]="6"
                        ></textarea>
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.fullDescription" />
                </label>
                <label class="object-form__control" for="objectShortDescriptionControl" tuiLabel>
                    Краткое описание
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().mainForm.controls.shortDescription"
                            id="objectShortDescriptionControl"
                            tuiInput
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.shortDescription" />
                </label>
            </div>
            <div class="object-form__group">
                <label class="object-form__control" for="objectDesignYearControl" tuiLabel>
                    Год дизайна
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().mainForm.controls.designYear"
                            id="objectDesignYearControl"
                            tuiInputYear
                        />
                        <tui-calendar-year *tuiDropdown />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.designYear" />
                </label>
                <label class="object-form__control" for="objectImplementationYearControl" tuiLabel>
                    Год реализации
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().mainForm.controls.implementationYear"
                            id="objectImplementationYearControl"
                            tuiInputYear
                        />
                        <tui-calendar-year *tuiDropdown />
                    </tui-textfield>
                    <tui-error [formControl]="model().mainForm.controls.implementationYear" />
                </label>
            </div>
        </div>
    </form>
</ng-template>

<ng-template #indicators>
    <form class="object-form__section" [formGroup]="model().indicatorsForm">
        <div class="object-form__subsection">
            <div class="object-form__group">
                <label class="object-form__control" for="objectTotalAreaControl" tuiLabel>
                    Общая площадь объекта, м2*
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().indicatorsForm.controls.totalArea"
                            id="objectTotalAreaControl"
                            tuiInputNumber
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().indicatorsForm.controls.totalArea" />
                </label>
                <label class="object-form__control" for="objectPlotAreaControl" tuiLabel>
                    Площадь участка, м2*
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().indicatorsForm.controls.plotArea"
                            id="objectPlotAreaControl"
                            tuiInputNumber
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().indicatorsForm.controls.plotArea" />
                </label>
                <label class="object-form__control" for="objectBuildingAreaControl" tuiLabel>
                    Площадь застройки, м2*
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().indicatorsForm.controls.buildingArea"
                            id="objectBuildingAreaControl"
                            tuiInputNumber
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().indicatorsForm.controls.buildingArea" />
                </label>
                <label class="object-form__control" for="objectSectionsCountControl" tuiLabel>
                    Количество корпусов/секций*
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().indicatorsForm.controls.sectionsCount"
                            id="objectSectionsCountControl"
                            tuiInputNumber
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().indicatorsForm.controls.sectionsCount" />
                </label>
            </div>
            <div class="object-form__group">
                <label class="object-form__control" for="objectFloorsCountControl" tuiLabel>
                    Количество этажей
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().indicatorsForm.controls.floorsCount"
                            id="objectFloorsCountControl"
                            tuiInputNumber
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().indicatorsForm.controls.floorsCount" />
                </label>
                <label class="object-form__control" for="objectRoomsCountControl" tuiLabel>
                    Количество квартир/помещений
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().indicatorsForm.controls.roomsCount"
                            id="objectRoomsCountControl"
                            tuiInputNumber
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().indicatorsForm.controls.roomsCount" />
                </label>
                <label class="object-form__control" for="objectParkingSpacesCountControl" tuiLabel>
                    Количество парковочных мест
                    <tui-textfield tuiTextfieldSize="s">
                        <input
                            [formControl]="model().indicatorsForm.controls.parkingSpacesCount"
                            id="objectParkingSpacesControl"
                            tuiInputNumber
                        />
                    </tui-textfield>
                    <tui-error [formControl]="model().indicatorsForm.controls.parkingSpacesCount" />
                </label>
            </div>
        </div>
    </form>
</ng-template>
